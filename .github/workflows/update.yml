name: Update Wheelie Bin Calendar

on:
  schedule:
    - cron: '0 6 1 * *'   # runs at 06:00, on day 1 of the month
  workflow_dispatch:        # allows manual run

jobs:
  update-calendar:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run PowerShell script
        shell: pwsh
        env:
          BIN_URL: ${{ secrets.BIN_URL }}
        run: ./Get-WheelieBinCalendar.ps1

      - name: Commit updated calendar
        run: |
          git config user.name "wheelie-bin-bot"
          git config user.email "actions@github.com"
          git add bins.ics
          git commit -m "Update bin calendar" || echo "No changes"
          git push
